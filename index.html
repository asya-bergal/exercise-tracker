<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercise Tracker</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    background: #1a1a2e;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #2a2a3e;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .date-display { font-size: 14px; color: #8888aa; }

  nav {
    display: flex;
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a3e;
    position: sticky;
    top: 53px;
    z-index: 99;
  }

  nav button {
    flex: 1;
    padding: 12px;
    background: none;
    border: none;
    color: #8888aa;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  nav button.active { color: #7c83ff; border-bottom-color: #7c83ff; }
  nav button:hover { color: #aaaacc; }

  .container { max-width: 700px; margin: 0 auto; padding: 16px; }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #7c83ff;
    margin: 20px 0 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .section-subtitle {
    font-size: 12px;
    color: #666;
    margin: -8px 0 12px;
  }

  .exercise-card {
    background: #1a1a2e;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.2s;
    border: 1px solid #2a2a3e;
  }

  .exercise-card.checked { opacity: 0.5; }
  .exercise-card.checked .exercise-name { text-decoration: line-through; }

  .color-indicator {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .exercise-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #444;
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: transparent;
    font-size: 12px;
    margin-top: 1px;
  }

  .exercise-check:hover { border-color: #7c83ff; }
  .exercise-check.done { background: #7c83ff; border-color: #7c83ff; color: #fff; }

  .exercise-info { flex: 1; min-width: 0; }

  .exercise-name { font-size: 15px; font-weight: 500; color: #e0e0e0; }

  .exercise-prescription {
    font-size: 12px;
    color: #aaa;
    margin-top: 2px;
  }

  .exercise-benchmark {
    font-size: 11px;
    color: #666;
    margin-top: 1px;
    font-style: italic;
  }

  .exercise-notes {
    font-size: 11px;
    color: #7c83ff;
    margin-top: 2px;
    opacity: 0.7;
  }

  .exercise-current {
    text-align: right;
    flex-shrink: 0;
  }

  .exercise-current-value {
    font-size: 13px;
    font-weight: 600;
    color: #ccc;
  }

  .exercise-current-label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
  }

  .btn-icon {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    padding: 4px;
    font-size: 16px;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .btn-icon:hover { color: #aaa; background: #2a2a3e; }

  .view { display: none; }
  .view.active { display: block; }

  .log-day { margin-bottom: 20px; }

  .log-date {
    font-size: 14px;
    font-weight: 600;
    color: #7c83ff;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #2a2a3e;
  }

  .log-entry {
    font-size: 13px;
    color: #aaa;
    padding: 4px 0;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .log-entry .color-indicator { width: 10px; height: 10px; margin-top: 0; }
  .log-check { color: #4caf50; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 24px;
    width: 90%;
    max-width: 480px;
    border: 1px solid #2a2a3e;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h2 { font-size: 18px; margin-bottom: 16px; color: #fff; }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    font-family: inherit;
  }

  .form-group input:focus,
  .form-group select:focus { border-color: #7c83ff; }

  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  .form-check {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .form-check input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #7c83ff;
  }

  .form-check label {
    font-size: 13px;
    color: #aaa;
    text-transform: none;
    letter-spacing: 0;
  }

  .modal-buttons {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn {
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary { background: #7c83ff; color: #fff; }
  .btn-primary:hover { background: #6b72ee; }
  .btn-secondary { background: #2a2a3e; color: #aaa; }
  .btn-secondary:hover { background: #333350; }
  .btn-danger { background: #442222; color: #ff6666; }
  .btn-danger:hover { background: #553333; }

  .add-btn {
    width: 100%;
    padding: 12px;
    background: #1a1a2e;
    border: 2px dashed #2a2a3e;
    border-radius: 10px;
    color: #555;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: all 0.2s;
  }

  .add-btn:hover { border-color: #7c83ff; color: #7c83ff; }

  .empty-state {
    text-align: center;
    color: #555;
    padding: 40px 20px;
    font-size: 14px;
  }

  .streak-bar {
    display: flex;
    gap: 3px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .streak-day {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    background: #1a1a2e;
    border: 1px solid #2a2a3e;
  }

  .streak-day.completed { background: #4caf50; border-color: #4caf50; }
  .streak-day.partial { background: #ff9800; border-color: #ff9800; }
  .streak-day.today { border-color: #7c83ff; border-width: 2px; }

  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    flex: 1;
    background: #1a1a2e;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    border: 1px solid #2a2a3e;
  }

  .stat-value { font-size: 28px; font-weight: 700; color: #7c83ff; }
  .stat-label { font-size: 11px; color: #666; text-transform: uppercase; margin-top: 4px; }

  .legend {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #888;
  }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .date-nav button {
    background: #1a1a2e;
    border: 1px solid #2a2a3e;
    color: #aaa;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }

  .date-nav button:hover { background: #2a2a3e; }

  .date-nav span {
    font-size: 15px;
    font-weight: 500;
    min-width: 160px;
    text-align: center;
  }

  .subsection-title {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    margin: 16px 0 8px;
    padding-left: 4px;
  }

  .exercise-details {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }

  /* Inline exercise card (weighted / per-set) */
  .gym-inline-card {
    background: #1a1a2e;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid #2a2a3e;
    transition: all 0.2s;
  }

  .gym-inline-card.checked {
    opacity: 0.5;
  }

  .gym-inline-card.checked .exercise-name {
    text-decoration: line-through;
  }

  .gym-inline-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }

  .gym-inline-inputs {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  .gym-input-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .gym-input-group label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .gym-input-group input {
    width: 56px;
    padding: 6px 8px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 5px;
    color: #e0e0e0;
    font-size: 14px;
    text-align: center;
    outline: none;
  }

  .gym-input-group input:focus {
    border-color: #7c83ff;
  }

  .gym-input-group.weight-group input {
    width: 64px;
  }

  .gym-input-divider {
    color: #444;
    font-size: 14px;
    padding-bottom: 6px;
  }

  .gym-log-btn {
    padding: 6px 14px;
    background: #7c83ff;
    border: none;
    border-radius: 5px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .gym-log-btn:hover { background: #6b72ee; }

  .gym-log-btn.logged {
    background: #2a3a2a;
    color: #4caf50;
  }

  .gym-logged-summary {
    font-size: 13px;
    color: #aaa;
    margin-top: 6px;
  }

  .gym-logged-summary strong {
    color: #ccc;
    font-weight: 600;
  }

  .gym-undo-btn {
    background: none;
    border: none;
    color: #666;
    font-size: 11px;
    cursor: pointer;
    margin-left: 8px;
    text-decoration: underline;
  }

  .gym-undo-btn:hover { color: #aaa; }

  /* Protein tracker */
  .protein-card {
    background: #1a1a2e;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
    border: 1px solid #2a2a3e;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .protein-bar-wrap {
    flex: 1;
    height: 8px;
    background: #2a2a3e;
    border-radius: 4px;
    overflow: hidden;
  }

  .protein-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s, background 0.3s;
  }

  .protein-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .protein-input-wrap input {
    width: 56px;
    padding: 6px 8px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 5px;
    color: #e0e0e0;
    font-size: 14px;
    text-align: center;
    outline: none;
  }

  .protein-input-wrap input:focus { border-color: #7c83ff; }

  .protein-label {
    font-size: 13px;
    font-weight: 500;
    color: #ccc;
  }

  .protein-goal {
    font-size: 11px;
    color: #666;
  }

  /* Weekly badge */
  .weekly-badge {
    font-size: 10px;
    background: #2a2a3e;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 8px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Low priority collapsed section */
  .low-priority-section {
    margin-top: 8px;
  }

  .low-priority-summary {
    cursor: pointer;
    list-style: none;
    user-select: none;
  }

  .low-priority-summary::-webkit-details-marker {
    display: none;
  }

  .low-priority-summary::marker {
    display: none;
    content: '';
  }

  .low-priority-summary .toggle-arrow {
    font-size: 10px;
    margin-left: 6px;
    transition: transform 0.2s;
    display: inline-block;
  }

  details.low-priority-section[open] .toggle-arrow {
    transform: rotate(90deg);
  }

  .skip-btn {
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: all 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }

  .skip-btn:hover { color: #ff6666; background: #2a2a3e; }

  .skipped-summary {
    text-align: center;
    color: #555;
    font-size: 13px;
    padding: 12px;
    margin-top: 8px;
  }

  .skipped-summary button {
    background: none;
    border: none;
    color: #7c83ff;
    cursor: pointer;
    font-size: 13px;
    text-decoration: underline;
    margin-left: 4px;
  }

  .skipped-summary button:hover { color: #9a9fff; }

  /* Exercise Detail View */
  .back-btn {
    background: none;
    border: none;
    color: #7c83ff;
    font-size: 14px;
    cursor: pointer;
    padding: 8px 0;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .back-btn:hover { color: #9a9fff; }

  .detail-header {
    background: #1a1a2e;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid #2a2a3e;
  }

  .detail-header .exercise-name {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
  }

  .detail-header .detail-group {
    font-size: 12px;
    color: #7c83ff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .detail-chart {
    background: #1a1a2e;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid #2a2a3e;
  }

  .detail-chart-title {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .detail-chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 120px;
    padding-bottom: 20px;
    position: relative;
    overflow-x: auto;
  }

  .detail-chart-bar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    min-width: 20px;
    max-width: 36px;
    height: 100%;
    justify-content: flex-end;
  }

  .detail-chart-bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    min-height: 4px;
    position: relative;
  }

  .detail-chart-bar-label {
    font-size: 9px;
    color: #888;
    margin-bottom: 2px;
    white-space: nowrap;
  }

  .detail-chart-date {
    font-size: 8px;
    color: #555;
    margin-top: 4px;
    white-space: nowrap;
  }

  .detail-chart-empty {
    text-align: center;
    color: #555;
    font-size: 13px;
    padding: 20px 0;
  }

  .detail-history {
    background: #1a1a2e;
    border-radius: 10px;
    padding: 16px;
    border: 1px solid #2a2a3e;
  }

  .detail-history-title {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .detail-history-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #2a2a3e;
    font-size: 13px;
  }

  .detail-history-entry:last-child { border-bottom: none; }

  .detail-history-date {
    color: #aaa;
    min-width: 100px;
  }

  .detail-history-value {
    color: #ccc;
    font-weight: 500;
    text-align: right;
  }

  .detail-history-empty {
    text-align: center;
    color: #555;
    font-size: 13px;
    padding: 12px 0;
  }

  .exercise-name-link {
    cursor: pointer;
    transition: color 0.15s;
  }

  .exercise-name-link:hover { color: #7c83ff; }

  .exercise-last {
    font-size: 11px;
    color: #555;
    margin-top: 2px;
  }

  .day-type-badge {
    display: inline-block;
    background: #2a2a3e;
    color: #7c83ff;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid #3a3a5e;
    margin-left: 8px;
    vertical-align: middle;
    font-family: inherit;
  }
  .day-type-badge:hover { background: #3a3a5e; }

</style>
</head>
<body>

<header>
  <h1>Exercise Tracker</h1>
  <div class="date-display" id="headerDate"></div>
</header>

<nav>
  <button class="active" onclick="showView('today')">Today</button>
  <button onclick="showView('exercises')">Exercises</button>
  <button onclick="showView('log')">Log</button>
</nav>

<div class="container">
  <!-- TODAY VIEW -->
  <div class="view active" id="view-today">
    <div class="date-nav">
      <button onclick="changeDay(-1)">&larr;</button>
      <span id="currentDayLabel"></span>
      <button onclick="changeDay(1)">&rarr;</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="statDone">0</div>
        <div class="stat-label">Done Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statStreak">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="color-indicator" style="background:#4caf50"></div> At benchmark</div>
      <div class="legend-item"><div class="color-indicator" style="background:#cddc39"></div> Close</div>
      <div class="legend-item"><div class="color-indicator" style="background:#ff9800"></div> Getting there</div>
      <div class="legend-item"><div class="color-indicator" style="background:#f44336"></div> Far off</div>
    </div>

    <div id="proteinTracker"></div>

    <div id="todayList"></div>
  </div>

  <!-- EXERCISES VIEW -->
  <div class="view" id="view-exercises">
    <div id="exercisesList"></div>
    <button class="add-btn" onclick="openAddModal()">+ Add Exercise</button>
  </div>

  <!-- LOG VIEW -->
  <div class="view" id="view-log">
    <div class="section-title">Last 14 Days</div>
    <div class="streak-bar" id="streakBar"></div>
    <div id="logList"></div>
  </div>

  <!-- EXERCISE DETAIL VIEW -->
  <div class="view" id="view-exercise-detail">
    <button class="back-btn" onclick="showView('today')">&larr; Back to Today</button>
    <div id="exerciseDetailContent"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="exerciseModal">
  <div class="modal">
    <h2 id="modalTitle">Add Exercise</h2>
    <div class="form-group">
      <label>Exercise Name</label>
      <input type="text" id="exName" placeholder="e.g. Dead Bug">
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="exPriority">
        <option value="high">High</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div class="form-group">
      <label>Type</label>
      <select id="exType" onchange="toggleTypeFields()">
        <option value="reps">Reps Only</option>
        <option value="timed">Reps &times; Hold Time</option>
        <option value="weighted">Weight + Reps</option>
        <option value="banded">Resistance Band + Reps</option>
        <option value="done">Just Do It</option>
      </select>
    </div>
    <div class="form-group" id="setsGroup">

// Which exercises appear on which day type ('both', 'a', or 'b')
const AB_DAY_MAP = {

  'Straight Leg Raise': 'both', 'Supine 90-90 Alternating Heel Touches (PPT)': 'both',
  'Side Lying Hip Abduction (Band)': 'both', 'Pallof Press': 'both',
  'Hollow Body Hold': 'both', 'Supine Chin Tuck & Hold': 'both',

  // A days (legs + Dead Bug)

  'Knee Extension': 'a', 'Hamstring Curl': 'a', 'Hip Extension Machine': 'a',
  'Calf Raise': 'a', 'Single Leg Glute Bridge': 'a',
  // B days (upper body) — b1/b2 alternate which row exercise appears
  'Standing Trap Shrug': 'b', 'Single Arm Bent Over Row': 'b1',
  'Bent Over Reverse Fly': 'b', 'Dumbbell Bench Press': 'b', 'Seated Row': 'b2',

};

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function fmtDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function loadState() {
  let raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) {
    // Migrate from v11
    raw = localStorage.getItem('exerciseTracker_v11');
  }
  if (raw) {
    const s = JSON.parse(raw);
    migrateState(s);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
    return s;
  }
  return defaultState();
}

function migrateState(s) {
  if (s.exercises) {
    // Remove exercises by name
    s.exercises = s.exercises.filter(e =>
      e.name !== 'Goblet Squat' && e.name !== 'Kettlebell Deadlift'
    );
    s.exercises.forEach(e => {
      if (!e.priority) {
        e.priority = LOW_PRIORITY_GROUPS.includes(e.group) ? 'low' : 'high';
      }
      if (PER_SET_EXERCISES.includes(e.name) && !e.perSet) {
        e.perSet = true;
      }
      if (e.name === 'Bird Dog') e.priority = 'low';
      // Always re-apply from AB_DAY_MAP for known exercises (handles b→b1/b2 updates)
      if (Object.prototype.hasOwnProperty.call(AB_DAY_MAP, e.name)) {
        e.abDay = AB_DAY_MAP[e.name];
      } else if (!e.abDay) {
        e.abDay = 'both';
      }
      delete e.category;
    });
  }
  if (!s.vitamind) s.vitamind = {};
  if (!s.abDayRef) s.abDayRef = { date: '2026-04-22', type: 'b' };
  if (!s.abDayOverrides) s.abDayOverrides = {};
  // b1 = Single Arm Row day, b2 = Seated Row day; today (Apr 22) was Single Arm Row → b1
  if (!s.bSubRef) s.bSubRef = { date: '2026-04-22', subtype: 'b1' };
  delete s.gymDays;
  delete s.gymDayDates;
  return s;
}

function defaultState() {
  const s = {
    exercises: getDefaultExercises(),
    log: {},
    protein: {},
    vitamind: {},
    abDayRef: { date: '2026-04-22', type: 'b' },

  return s;
}

const FIREBASE_CONFIG = {

};

let fbDb = null;
let fbRef = null;
let fbIgnoreNext = false;

function initFirebase() {
  startFirebase(FIREBASE_CONFIG);
}

function startFirebase(config) {
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(config);
    }
    fbDb = firebase.database();
    fbRef = fbDb.ref('exerciseTracker');

    // Listen for remote changes
    fbRef.on('value', (snapshot) => {
      if (fbIgnoreNext) { fbIgnoreNext = false; return; }
      const remote = snapshot.val();
      if (remote) {
        // Merge: combine logs from both sides so no day is lost
        const merged = { ...state };
        if (remote.log) {
          if (!merged.log) merged.log = {};
          for (const [day, remoteDay] of Object.entries(remote.log)) {
            if (!merged.log[day]) {
              merged.log[day] = remoteDay;
            } else {
              for (const [exId, remoteEntry] of Object.entries(remoteDay)) {
                if (!merged.log[day][exId]) {
                  merged.log[day][exId] = remoteEntry;
                } else {
                  // Deep merge: preserve local fields (like repsL/repsR) that remote may lack
                  merged.log[day][exId] = { ...merged.log[day][exId], ...remoteEntry };
                }
              }
            }
          }
        }
        if (remote.protein) {
          if (!merged.protein) merged.protein = {};
          Object.assign(merged.protein, remote.protein);
        }
        // Use remote exercises if they exist (last writer wins for exercise list)
        if (remote.exercises) {
          merged.exercises = remote.exercises;
          // Ensure migrated
          migrateState(merged);
        }

        state = merged;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        renderCurrentView();
      }
    });

    console.log('Firebase connected');
  } catch(e) {
    console.error('Firebase error:', e);
  }
}

function syncToFirebase() {
  if (!fbRef) return;
  fbIgnoreNext = true;
  fbRef.set(state).catch(e => {
    console.error('Sync write error:', e);
    fbIgnoreNext = false;
  });
}

// ─── Color calc ─────────────────────────────────────────────────────────
function getProgressRatio(ex) {
  if (ex.type === 'done') return 1;
  if (ex.type === 'reps') {
    if (ex.benchReps <= 0) return 1;
    return Math.min(ex.reps / ex.benchReps, 1);
  }
  if (ex.type === 'timed') {
    let rr = ex.benchReps > 0 ? Math.min(ex.reps / ex.benchReps, 1) : 1;
    let hr = ex.benchHoldSec > 0 ? Math.min(ex.holdSec / ex.benchHoldSec, 1) : 1;
    return (rr + hr) / 2;
  }
  if (ex.type === 'weighted') {
    let wr = ex.benchWeight > 0 ? Math.min(ex.weight / ex.benchWeight, 1) : 1;
    let rr = ex.benchReps > 0 ? Math.min(ex.reps / ex.benchReps, 1) : 1;
    return (wr + rr) / 2;
  }
  if (ex.type === 'banded') {
    let br = ex.benchBandLevel > 0 ? Math.min(ex.bandLevel / ex.benchBandLevel, 1) : 1;
    let rr = ex.benchReps > 0 ? Math.min(ex.reps / ex.benchReps, 1) : 1;
    return (br + rr) / 2;
  }
  return 1;
}

function ratioToColor(ratio) {
  if (ratio >= 0.95) return '#4caf50';
  if (ratio >= 0.75) return '#8bc34a';
  if (ratio >= 0.55) return '#cddc39';
  if (ratio >= 0.35) return '#ff9800';
  return '#f44336';
}

// ─── Formatting helpers ─────────────────────────────────────────────────
function fmtPrescription(ex) {
  const side = ex.eachSide ? ', each side' : '';
  if (ex.type === 'reps') {
    return `${ex.sets} &times; ${ex.reps} reps${side}`;
  }
  if (ex.type === 'timed') {
    if (ex.reps === 1) return `${ex.sets} &times; ${ex.holdSec}s hold${side}`;
    return `${ex.reps} reps &times; ${ex.holdSec}s hold${side}`;
  }
  if (ex.type === 'weighted') {
    return `${ex.sets} &times; ${ex.reps} @ ${ex.weight} lbs${side}`;
  }
  if (ex.type === 'banded') {
    return `${ex.sets} &times; ${ex.reps} reps (${BAND_NAMES[ex.bandLevel] || 'X-Light'} band)${side}`;
  }
  return 'Complete';
}

function fmtBenchmark(ex) {
  const side = ex.eachSide ? ', each side' : '';
  if (ex.type === 'reps') {
    return `Normal: ${ex.benchReps} reps${side}`;
  }
  if (ex.type === 'timed') {
    if (ex.benchReps === 1) return `Normal: ${ex.benchHoldSec}s hold${side}`;
    return `Normal: ${ex.benchReps} reps &times; ${ex.benchHoldSec}s${side}`;
  }
  if (ex.type === 'weighted') {
    return `Normal: ${ex.benchReps} @ ${ex.benchWeight} lbs${side}`;
  }
  if (ex.type === 'banded') {
    return `Normal: ${ex.benchReps} reps (${BAND_NAMES[ex.benchBandLevel] || 'Medium'} band)${side}`;
  }
  return 'Just do it';
}

function fmtCurrent(ex, entry) {
  if (ex.type === 'done') return entry?.done ? 'Done!' : '—';
  // Per-set display
  if (ex.perSet && entry?.repsPerSet) {
    const setStr = entry.repsPerSet.join(' / ');
    if (ex.type === 'banded') {
      const bl = entry?.bandLevel ?? ex.bandLevel;
      return `${BAND_NAMES[bl] || '?'}<br>${setStr}`;
    }
    return setStr;
  }
  if (ex.type === 'reps') {
    return `${entry?.reps ?? ex.reps} reps`;
  }
  if (ex.type === 'timed') {
    const r = entry?.reps ?? ex.reps;
    const h = entry?.holdSec ?? ex.holdSec;
    if (r === 1) return `${h}s hold`;
    return `${r} &times; ${h}s`;
  }
  if (ex.type === 'weighted') {
    return `${entry?.weight ?? ex.weight} lbs &times; ${entry?.reps ?? ex.reps}`;
  }
  if (ex.type === 'banded') {
    const bl = entry?.bandLevel ?? ex.bandLevel;
    return `${BAND_NAMES[bl] || 'X-Light'} &times; ${entry?.reps ?? ex.reps}`;
  }
  return '—';
}

// ─── Last completion helpers ─────────────────────────────────────────────
function getLastCompletion(exId) {
  const dates = Object.keys(state.log)
    .filter(d => d < currentViewDate && state.log[d]?.[exId]?.done)
    .sort().reverse();
  if (!dates.length) return null;
  return { date: dates[0], entry: state.log[dates[0]][exId] };
}

function fmtLastValue(ex, entry) {
  if (ex.type === 'done') return '✓';
  if (ex.type === 'timed') {
    const r = entry.reps || 0, h = entry.holdSec || 0;
    return r === 1 ? `${h}s hold` : `${r}×${h}s`;
  }
  if (ex.type === 'weighted') {
    const rps = toArray(entry.repsPerSet);
    const rStr = rps && rps.length ? rps.join('/') : (entry.reps || 0);
    return `${entry.weight || 0} lbs × ${rStr}`;
  }
  if (ex.type === 'banded') {
    const rps = toArray(entry.repsPerSet);
    const rStr = rps && rps.length ? rps.join('/') : (entry.reps || 0);
    return `${BAND_NAMES[entry.bandLevel] || '?'} × ${rStr}`;
  }
  const rL = toArray(entry.repsL), rR = toArray(entry.repsR);
  if (rL && rR && rL.length && rR.length) return `L:${rL.join('/')} R:${rR.join('/')}`;
  const rps = toArray(entry.repsPerSet);
  if (rps && rps.length) return rps.join('/') + ' reps';
  return `${entry.reps || 0} reps`;
}

function lastCompletionHtml(ex) {
  const last = getLastCompletion(ex.id);
  if (!last) return '';
  const d = new Date(last.date + 'T12:00:00');
  const dl = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return `<div class="exercise-last">${dl}: ${fmtLastValue(ex, last.entry)}</div>`;
}

// ─── Weekly completion tracking ─────────────────────────────────────────
function weeklyCompletionCount(exId, dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay(); // 0=Sun
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((day + 6) % 7));
  let count = 0;
  for (let i = 0; i < 7; i++) {
    const check = new Date(monday);
    check.setDate(monday.getDate() + i);
    const ds = fmtDateStr(check);
    if (state.log[ds]?.[exId]?.done) count++;
  }
  return count;
}

function weeklyBadgeHtml(exId, dateStr) {
  const count = weeklyCompletionCount(exId, dateStr);
  const color = count >= 3 ? '#4caf50' : count >= 1 ? '#ff9800' : '#666';
  return `<span class="weekly-badge" style="color:${color}">${count}/3-4</span>`;
}

// ─── Views ──────────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', ['today','exercises','log'][i] === name);
  });
  if (name === 'today') renderToday();
  if (name === 'exercises') renderExercises();
  if (name === 'log') renderLog();
  if (name === 'exercise-detail') renderExerciseDetail();
}

let currentDetailExId = null;

function showExerciseDetail(exId) {
  currentDetailExId = exId;
  showView('exercise-detail');
}

// ─── A/B Day Logic ──────────────────────────────────────────────────────
function getDayType(dateStr) {
  if (state.abDayOverrides?.[dateStr]) return state.abDayOverrides[dateStr];
  const ref = state.abDayRef || { date: '2026-04-22', type: 'b' };
  const diff = Math.round(
    (new Date(dateStr + 'T12:00:00') - new Date(ref.date + 'T12:00:00')) / 86400000
  );
  const dateIsRef = (diff % 2 === 0);
  return (dateIsRef === (ref.type === 'b')) ? 'b' : 'a';
}

function toggleDayType() {
  if (!state.abDayOverrides) state.abDayOverrides = {};
  const current = getDayType(currentViewDate);
  state.abDayOverrides[currentViewDate] = current === 'a' ? 'b' : 'a';
  save();
  renderToday();
}

function getBSubtype(dateStr) {
  // Returns 'b1' or 'b2' for B days, based on which B-day sub-cycle this is
  const ref = state.bSubRef || { date: '2026-04-22', subtype: 'b1' };
  const diffDays = Math.round(
    (new Date(dateStr + 'T12:00:00') - new Date(ref.date + 'T12:00:00')) / 86400000
  );
  // ref is a B day, so B days occur every 2 days; diffDays/2 = how many B days from ref
  const bIndex = diffDays / 2;
  return (Math.abs(bIndex) % 2 === 0) ? ref.subtype : (ref.subtype === 'b1' ? 'b2' : 'b1');
}

function dayExercises(dateStr) {
  const dayType = getDayType(dateStr);
  const bSub = dayType === 'b' ? getBSubtype(dateStr) : null;
  return state.exercises.filter(e => {
    const ab = e.abDay;
    if (!ab || ab === 'both') return true;
    if (ab === 'a') return dayType === 'a';
    if (ab === 'b') return dayType === 'b';
    if (ab === 'b1') return bSub === 'b1';
    if (ab === 'b2') return bSub === 'b2';
    return true;
  });
}

// ─── Today View ─────────────────────────────────────────────────────────
function changeDay(offset) {
  const d = new Date(currentViewDate + 'T12:00:00');
  d.setDate(d.getDate() + offset);
  currentViewDate = fmtDateStr(d);
  renderToday();
}

function renderPriorityExercises(exercises, dayLog) {
  // Group by group name
  const groups = {};
  exercises.forEach(e => {
    const g = e.group || 'General';
    if (!groups[g]) groups[g] = [];
    groups[g].push(e);
  });

  // Sort groups by minimum weekly count (most urgent first)
  const groupEntries = Object.entries(groups);
  groupEntries.sort((a, b) => {
    const minA = Math.min(...a[1].map(e => weeklyCompletionCount(e.id, currentViewDate)));
    const minB = Math.min(...b[1].map(e => weeklyCompletionCount(e.id, currentViewDate)));
    return minA - minB;
  });

  let html = '';
  for (const [groupName, exs] of groupEntries) {
    exs.sort((a, b) => weeklyCompletionCount(a.id, currentViewDate) - weeklyCompletionCount(b.id, currentViewDate));
    html += `<div class="subsection-title">${groupName}</div>`;
    exs.forEach(e => { html += renderTodayCard(e, dayLog); });
  }
  return html;
}

function renderToday() {
  const dateObj = new Date(currentViewDate + 'T12:00:00');
  const opts = { weekday: 'long', month: 'long', day: 'numeric' };
  const label = dateObj.toLocaleDateString('en-US', opts);
  const isToday = currentViewDate === todayStr();
  document.getElementById('currentDayLabel').innerHTML = label + (isToday ? ' <span style="color:#7c83ff">(Today)</span>' : '');

  const dayLog = state.log[currentViewDate] || {};
  const todayEx = dayExercises(currentViewDate);
  const active = todayEx.filter(e => !dayLog[e.id]?.skipped);
  const skippedCount = todayEx.length - active.length;
  const doneCount = active.filter(e => dayLog[e.id]?.done).length;

  document.getElementById('statDone').textContent = doneCount;
  document.getElementById('statTotal').textContent = active.length;
  document.getElementById('statStreak').textContent = calcStreak();

  const highPriority = active.filter(e => e.priority === 'high');
  const lowPriority = active.filter(e => e.priority === 'low');

  let html = '';

  // High priority section
  if (highPriority.length) {
    html += '<div class="section-title">Priority Exercises</div>';
    html += renderPriorityExercises(highPriority, dayLog);
  }

  // Low priority section (collapsed)
  if (lowPriority.length) {
    html += '<details class="low-priority-section">';
    html += '<summary class="section-title low-priority-summary">Low Priority <span class="toggle-arrow">&#9656;</span></summary>';
    html += renderPriorityExercises(lowPriority, dayLog);
    html += '</details>';
  }

  // Skipped summary
  if (skippedCount > 0) {
    html += `<div class="skipped-summary">${skippedCount} exercise${skippedCount > 1 ? 's' : ''} skipped<button onclick="unskipAll()">undo all</button></div>`;
  }

  document.getElementById('todayList').innerHTML = html;
  renderProtein();
}

function renderTodayCard(ex, dayLog) {
  const entry = dayLog[ex.id];
  const done = entry?.done;
  const ratio = getProgressRatio(ex);
  const color = ratioToColor(ratio);
  const badge = weeklyBadgeHtml(ex.id, currentViewDate);

  // Per-set exercises get inline inputs (check first so weighted+perSet gets L/R)
  if (ex.perSet) {
    return renderPerSetCard(ex, entry, ratio, color, badge);
  }

  // Weighted exercises get inline inputs
  if (ex.type === 'weighted') {
    return renderWeightedCard(ex, entry, ratio, color, badge);
  }

  const checkedClass = done ? 'checked' : '';
  const doneClass = done ? 'done' : '';
  const canEdit = ex.type !== 'done';

  const currentStr = fmtCurrent(ex, entry);
  const benchStr = fmtBenchmark(ex);
  const prescStr = fmtPrescription(ex);
  const notesStr = ex.notes ? `<div class="exercise-notes">${ex.notes}</div>` : '';
  const sparkline = renderMiniSparkline(ex);
  const lastHtml = lastCompletionHtml(ex);

  const editAttrs = canEdit ? `style="cursor:pointer" onclick="openLogEntryModal('${ex.id}')"` : '';

  return `
    <div class="exercise-card ${checkedClass}">
      <div class="color-indicator" style="background:${color}" title="${Math.round(ratio*100)}% of benchmark"></div>
      <button class="exercise-check ${doneClass}" onclick="toggleDone('${ex.id}')">&#10003;</button>
      <div class="exercise-info">
        <div class="exercise-name"><span class="exercise-name-link" onclick="showExerciseDetail('${ex.id}')">${ex.name}</span> ${badge}</div>
        <div class="exercise-prescription">${prescStr}</div>
        <div class="exercise-benchmark">${benchStr}</div>
        ${notesStr}
        ${lastHtml}
      </div>
      ${sparkline}
      <div class="exercise-current" ${editAttrs}>
        <div class="exercise-current-value">${currentStr}</div>
        ${canEdit ? '<div class="exercise-current-label">tap to edit</div>' : ''}
      </div>
      ${!done ? `<button class="skip-btn" onclick="skipExercise('${ex.id}')" title="Skip today">&#10005;</button>` : ''}

}

function logPerSetExercise(exId, sets) {
  const ex = state.exercises.find(e => e.id === exId);
  if (!ex) return;
  if (!state.log[currentViewDate]) state.log[currentViewDate] = {};

  const bandLevel = parseInt(document.getElementById(`perset-band-${exId}`)?.value) || ex.bandLevel || 0;
  const weight = parseFloat(document.getElementById(`perset-weight-${exId}`)?.value) || ex.weight || 0;
  let logEntry;

  if (ex.type === 'weighted') ex.weight = weight;

  if (ex.eachSide) {
    const repsL = [], repsR = [];
    for (let i = 0; i < sets; i++) {
      repsL.push(parseInt(document.getElementById(`perset-L-${exId}-${i}`)?.value) || 0);
      repsR.push(parseInt(document.getElementById(`perset-R-${exId}-${i}`)?.value) || 0);
    }
    const allReps = [...repsL, ...repsR];
    const avgReps = allReps.length ? Math.round(allReps.reduce((a,b) => a+b, 0) / allReps.length) : 0;
    ex.reps = avgReps;
    if (ex.type === 'banded') ex.bandLevel = bandLevel;
    logEntry = { done: true, reps: avgReps, repsL, repsR, holdSec: 0, weight, bandLevel };
  } else {
    const repsPerSet = [];
    for (let i = 0; i < sets; i++) {
      repsPerSet.push(parseInt(document.getElementById(`perset-reps-${exId}-${i}`)?.value) || 0);
    }
    const avgReps = repsPerSet.length ? Math.round(repsPerSet.reduce((a,b) => a+b, 0) / repsPerSet.length) : 0;
    ex.reps = avgReps;

// ─── Streak ─────────────────────────────────────────────────────────────
function calcStreak() {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const ds = fmtDateStr(d);
    const dayLog = state.log[ds] || {};
    const exs = dayExercises(ds);
    const doneCount = exs.filter(e => dayLog[e.id]?.done).length;
    if (exs.length > 0 && doneCount === exs.length) {
      streak++;
    } else if (i > 0) {
      break;
    } else {
      d.setDate(d.getDate() - 1);
      continue;
    }
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

// ─── Log View ───────────────────────────────────────────────────────────
function renderLog() {
  let streakHtml = '';
  const exercises = state.exercises;
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = fmtDateStr(d);
    const dayLog = state.log[ds] || {};
    const doneCount = exercises.filter(e => dayLog[e.id]?.done).length;
    const isTodayClass = ds === todayStr() ? ' today' : '';
    let statusClass = '';
    if (exercises.length > 0) {
      if (doneCount === exercises.length) statusClass = ' completed';
      else if (doneCount > 0) statusClass = ' partial';
    }
    const dayLabel = d.toLocaleDateString('en-US', { weekday: 'short' });
    streakHtml += `<div class="streak-day${statusClass}${isTodayClass}" title="${dayLabel} ${ds}"></div>`;
  }
  document.getElementById('streakBar').innerHTML = streakHtml;

  let logHtml = '';
  const dates = Object.keys(state.log).sort().reverse().slice(0, 30);
  if (!dates.length) {
    logHtml = '<div class="empty-state">No logged exercises yet. Check off exercises in the Today view to start logging!</div>';
  }
  dates.forEach(ds => {
    const dateObj = new Date(ds + 'T12:00:00');
    const label = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    const dayLog = state.log[ds];
    const entries = Object.entries(dayLog).filter(([_, v]) => v.done);
    if (!entries.length) return;

    logHtml += `<div class="log-day"><div class="log-date">${label}</div>`;
    entries.forEach(([exId, entry]) => {
      const ex = state.exercises.find(e => e.id === exId);
      if (!ex) return;
      const ratio = getProgressRatio(ex);
      const color = ratioToColor(ratio);
      let detail = '';
      if (ex.type === 'reps') {
        detail = ` — ${fmtRepsDetail(entry)}`;
      } else if (ex.type === 'timed') detail = ` — ${entry.reps} &times; ${entry.holdSec}s`;
      else if (ex.type === 'weighted') {
        detail = ` — ${entry.weight} lbs &times; ${fmtRepsDetail(entry)}`;
      }
      else if (ex.type === 'banded') {
        detail = ` — ${BAND_NAMES[entry.bandLevel] || '?'} &times; ${fmtRepsDetail(entry)}`;
      }

      logHtml += `<div class="log-entry"><div class="color-indicator" style="background:${color}"></div><span class="log-check">&#10003;</span> ${ex.name}${detail}</div>`;
    });
    // Protein for this day
    const dayProtein = state.protein?.[ds];
    if (dayProtein) {
      const pColor = dayProtein >= PROTEIN_GOAL ? '#4caf50' : dayProtein >= PROTEIN_GOAL * 0.5 ? '#ff9800' : '#f44336';
      logHtml += `<div class="log-entry"><div class="color-indicator" style="background:${pColor}"></div> Protein: ${dayProtein}g / ${PROTEIN_GOAL}g</div>`;

function getEntryPrimaryValue(ex, entry) {
  if (ex.type === 'weighted') return entry.weight || 0;
  if (ex.type === 'reps') return entry.reps || 0;
  if (ex.type === 'timed') return entry.holdSec || 0;
  if (ex.type === 'banded') return entry.bandLevel || 0;
  return 1; // done type
}

function getEntryVolumes(ex, entry) {
  // Returns { total, L, R } — L/R are non-null only when per-side data exists
  if (ex.type === 'done') return { total: 1, L: null, R: null };
  if (ex.type === 'weighted') return { total: entry.weight || 0, L: null, R: null };
  if (ex.type === 'timed') {
    const total = (entry.reps || 0) * (entry.holdSec || 0);
    return { total, L: null, R: null };
  }
  const rL = toArray(entry.repsL);
  const rR = toArray(entry.repsR);
  const rps = toArray(entry.repsPerSet);
  if (ex.eachSide && rL && rR && rL.length && rR.length) {
    const sumL = rL.reduce((a, b) => a + b, 0);
    const sumR = rR.reduce((a, b) => a + b, 0);
    return { total: sumL + sumR, L: sumL, R: sumR };
  }
  if (rps && rps.length) return { total: rps.reduce((a, b) => a + b, 0), L: null, R: null };
  return { total: (entry.reps || 0) * (ex.sets || 3), L: null, R: null };
}

function renderDetailLineChart(ex, last30) {
  const dataPoints = last30.map(h => ({ date: h.date, ...getEntryVolumes(ex, h.entry) }));
  const hasLR = dataPoints.some(d => d.L !== null && d.R !== null);

  const seriesA = dataPoints.map(d => hasLR ? (d.L !== null ? d.L : d.total / 2) : d.total);
  const seriesB = hasLR ? dataPoints.map(d => d.R !== null ? d.R : d.total / 2) : null;

  const allVals = [...seriesA, ...(seriesB || [])];
  const maxVal = Math.max(...allVals, 1);

  const svgW = 400, svgH = 120;
  const padL = 30, padR = 8, padT = 10, padB = 24;
  const chartW = svgW - padL - padR;
  const chartH = svgH - padT - padB;
  const n = last30.length;

  const xPos = i => padL + (n <= 1 ? chartW / 2 : (i / (n - 1)) * chartW);
  const yPos = v => padT + chartH - (v / maxVal) * chartH;

  function makeLine(series, color) {
    const pts = series.map((v, i) => `${xPos(i).toFixed(1)},${yPos(v).toFixed(1)}`).join(' ');
    const dots = series.map((v, i) =>
      `<circle cx="${xPos(i).toFixed(1)}" cy="${yPos(v).toFixed(1)}" r="3.5" fill="${color}" stroke="#1a1a2e" stroke-width="1.5"/>`
    ).join('');
    return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
  }

  // Subtle horizontal grid lines
  const grid = [0.25, 0.5, 0.75].map(f => {
    const y = yPos(f * maxVal).toFixed(1);
    return `<line x1="${padL}" y1="${y}" x2="${padL + chartW}" y2="${y}" stroke="#222236" stroke-width="1"/>`;
  }).join('');

  // Axes
  const axes = `
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + chartH}" stroke="#333" stroke-width="1"/>
    <line x1="${padL}" y1="${padT + chartH}" x2="${padL + chartW}" y2="${padT + chartH}" stroke="#333" stroke-width="1"/>`;

  // Y axis labels
  const yLabels = `
    <text x="${padL - 4}" y="${padT + 4}" text-anchor="end" dominant-baseline="hanging" font-size="8" fill="#555">${maxVal}</text>
    <text x="${padL - 4}" y="${padT + chartH}" text-anchor="end" font-size="8" fill="#555">0</text>`;

  // X date labels: first, last, and up to 2 middle
  const labelIdx = new Set([0, n - 1]);
  if (n > 4) { const s = Math.floor(n / 3); for (let i = s; i < n - 1; i += s) labelIdx.add(i); }
  const dateLabels = [...labelIdx].map(i => {
    const d = new Date(last30[i].date + 'T12:00:00');
    const lbl = (d.getMonth() + 1) + '/' + d.getDate();
    return `<text x="${xPos(i).toFixed(1)}" y="${svgH - 3}" text-anchor="middle" font-size="8" fill="#555">${lbl}</text>`;
  }).join('');

  const svg = `<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:130px;display:block;overflow:visible">
    ${grid}${axes}${yLabels}${dateLabels}
    ${makeLine(seriesA, '#7c83ff')}
    ${hasLR ? makeLine(seriesB, '#4caf50') : ''}
  </svg>`;

  const yLabel = ex.type === 'weighted' ? 'weight (lbs)' : ex.type === 'timed' ? 'total sec' : 'total reps';
  const legend = hasLR ? `
    <div style="display:flex;gap:14px;margin-top:6px;font-size:11px;color:#888">
      <span style="display:flex;align-items:center;gap:5px">
        <svg width="16" height="4" style="flex-shrink:0;overflow:visible"><line x1="0" y1="2" x2="16" y2="2" stroke="#7c83ff" stroke-width="2"/></svg>Left
      </span>
      <span style="display:flex;align-items:center;gap:5px">
        <svg width="16" height="4" style="flex-shrink:0;overflow:visible"><line x1="0" y1="2" x2="16" y2="2" stroke="#4caf50" stroke-width="2"/></svg>Right
      </span>
    </div>` : '';

  return `
    <div class="detail-chart">
      <div class="detail-chart-title">Progress — ${yLabel} (last ${last30.length} sessions)</div>
      ${svg}
      ${legend}
    </div>`;
}

function renderDetailChart(ex, history) {
  const last30 = history.slice(0, 30).reverse(); // chronological order for chart

  if (!last30.length) {
    return `
      <div class="detail-chart">
        <div class="detail-chart-title">Progress</div>
        <div class="detail-chart-empty">No completions yet</div>
      </div>`;
  }

  return renderDetailLineChart(ex, last30);
}

function renderMiniSparkline(ex) {
  const history = [];
  for (const [dateStr, dayLog] of Object.entries(state.log)) {
    const entry = dayLog[ex.id];
    if (entry?.done) history.push({ date: dateStr, entry });
  }
  if (history.length < 2) return '';
  history.sort((a, b) => a.date.localeCompare(b.date));
  const last12 = history.slice(-12);

  const dataPoints = last12.map(h => getEntryVolumes(ex, h.entry));
  const hasLR = dataPoints.some(d => d.L !== null && d.R !== null);
  const seriesA = dataPoints.map(d => hasLR ? (d.L !== null ? d.L : d.total / 2) : d.total);
  const seriesB = hasLR ? dataPoints.map(d => d.R !== null ? d.R : d.total / 2) : null;

  const allVals = [...seriesA, ...(seriesB || [])];
  const maxVal = Math.max(...allVals, 1);
  const minVal = Math.min(...allVals, 0);
  const range = maxVal - minVal || 1;

  const W = 64, H = 32, pad = 3;
  const n = last12.length;
  const xPos = i => pad + (n <= 1 ? (W - 2 * pad) / 2 : (i / (n - 1)) * (W - 2 * pad));
  const yPos = v => H - pad - ((v - minVal) / range) * (H - 2 * pad);

  function sparkLine(series, color) {
    const pts = series.map((v, i) => `${xPos(i).toFixed(1)},${yPos(v).toFixed(1)}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  }

  return `<svg width="${W}" height="${H}" style="display:block;flex-shrink:0;opacity:0.8;align-self:center">
    ${sparkLine(seriesA, '#7c83ff')}
    ${hasLR ? sparkLine(seriesB, '#4caf50') : ''}
  </svg>`;
}

function getEntryRatio(ex, entry) {
  if (ex.type === 'done') return 1;
  if (ex.type === 'reps') {
    if (ex.benchReps <= 0) return 1;
    return Math.min((entry.reps || 0) / ex.benchReps, 1);
  }
  if (ex.type === 'timed') {
    let rr = ex.benchReps > 0 ? Math.min((entry.reps || 0) / ex.benchReps, 1) : 1;
    let hr = ex.benchHoldSec > 0 ? Math.min((entry.holdSec || 0) / ex.benchHoldSec, 1) : 1;
    return (rr + hr) / 2;
  }
  if (ex.type === 'weighted') {
    let wr = ex.benchWeight > 0 ? Math.min((entry.weight || 0) / ex.benchWeight, 1) : 1;
    let rr = ex.benchReps > 0 ? Math.min((entry.reps || 0) / ex.benchReps, 1) : 1;
    return (wr + rr) / 2;
  }
  if (ex.type === 'banded') {
    let br = ex.benchBandLevel > 0 ? Math.min((entry.bandLevel || 0) / ex.benchBandLevel, 1) : 1;
    let rr = ex.benchReps > 0 ? Math.min((entry.reps || 0) / ex.benchReps, 1) : 1;
    return (br + rr) / 2;
  }
  return 1;
}

// Firebase RTDB can convert arrays to objects with numeric keys — normalize back
function toArray(val) {
  if (Array.isArray(val)) return val;
  if (val && typeof val === 'object') return Object.values(val);
  return null;
}

function fmtChartLabel(entry) {
  const rL = toArray(entry.repsL);
  const rR = toArray(entry.repsR);
  if (rL && rR) return rL.join('/') + ' ' + rR.join('/');
  const rps = toArray(entry.repsPerSet);
  if (rps && rps.length) return rps.join('/');
  return (entry.reps || 0) + 'r';
}

function fmtRepsDetail(entry) {
  const rL = toArray(entry.repsL);
  const rR = toArray(entry.repsR);
  if (rL && rR) return 'L: ' + rL.join(' / ') + ' R: ' + rR.join(' / ') + ' reps';
  const rps = toArray(entry.repsPerSet);
  if (rps && rps.length) return rps.join(' / ') + ' reps';
  return (entry.reps || 0) + ' reps';
}

function fmtHistoryEntry(ex, entry) {
  if (ex.type === 'done') return 'Completed';

  if (ex.type === 'weighted') {
    return `${entry.weight || 0} lbs &times; ${fmtRepsDetail(entry)}`;
  }

  if (ex.type === 'reps') {
    return fmtRepsDetail(entry);
  }

  if (ex.type === 'timed') {
    const r = entry.reps || 0;
    const h = entry.holdSec || 0;
    if (r === 1) return h + 's hold';
    return r + ' &times; ' + h + 's';
  }

  if (ex.type === 'banded') {
    const bandName = BAND_NAMES[entry.bandLevel] || '?';
    return bandName + ' &times; ' + fmtRepsDetail(entry);
  }

  return 'Completed';
}

function renderDetailHistory(ex, history) {
  const last30 = history.slice(0, 30);

  if (!last30.length) {
    return `
      <div class="detail-history">
        <div class="detail-history-title">History</div>
        <div class="detail-history-empty">No completions yet</div>
      </div>`;
  }

  let entriesHtml = '';
  last30.forEach(h => {
    const dateObj = new Date(h.date + 'T12:00:00');
    const dateLabel = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const valueStr = fmtHistoryEntry(ex, h.entry);

    entriesHtml += `
      <div class="detail-history-entry">
        <div class="detail-history-date">${dateLabel}</div>
        <div class="detail-history-value">${valueStr}</div>
      </div>`;
  });

  return `
    <div class="detail-history">
      <div class="detail-history-title">History (last ${last30.length})</div>
      ${entriesHtml}
    </div>`;
}

// ─── Init ───────────────────────────────────────────────────────────────
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
renderToday();
initFirebase();
</script>
